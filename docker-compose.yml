services:
  db:
    image: postgres:16-alpine
    container_name: movienexus-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-movienexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saltbox

  redis:
    image: redis:7-alpine
    container_name: movienexus-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saltbox

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movienexus-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@movienexus-db:5432/${POSTGRES_DB:-movienexus}
      REDIS_URL: redis://movienexus-redis:6379/0
      TMDB_API_KEY: ${TMDB_API_KEY}
      TVDB_API_KEY: ${TVDB_API_KEY}
      FANART_API_KEY: ${FANART_API_KEY}
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-false}
    ports:
      - "${BACKEND_PORT:-8910}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./VERSION:/app/../VERSION:ro
    networks:
      - saltbox
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.movienexus-api-http.entrypoints=web"
      - "traefik.http.routers.movienexus-api-http.middlewares=globalHeaders@file,redirect-to-https@docker,robotHeaders@file"
      - "traefik.http.routers.movienexus-api-http.rule=Host(`movienexus.e4z.xyz`) && PathPrefix(`/api`)"
      - "traefik.http.routers.movienexus-api-http.service=movienexus-api-http"
      - "traefik.http.routers.movienexus-api.entrypoints=websecure"
      - "traefik.http.routers.movienexus-api.middlewares=globalHeaders@file,secureHeaders@file,robotHeaders@file"
      - "traefik.http.routers.movienexus-api.rule=Host(`movienexus.e4z.xyz`) && PathPrefix(`/api`)"
      - "traefik.http.routers.movienexus-api.service=movienexus-api"
      - "traefik.http.routers.movienexus-api.tls=true"
      - "traefik.http.routers.movienexus-api.tls.certresolver=cfdns"
      - "traefik.http.routers.movienexus-api.tls.domains[0].main=e4z.xyz"
      - "traefik.http.routers.movienexus-api.tls.domains[0].sans=*.e4z.xyz"
      - "traefik.http.routers.movienexus-api.tls.options=securetls@file"
      - "traefik.http.services.movienexus-api-http.loadbalancer.server.port=8000"
      - "traefik.http.services.movienexus-api.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movienexus-frontend
    environment:
      NEXT_PUBLIC_API_URL: https://movienexus.e4z.xyz/api
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_DATABASE_URL: file:/app/prisma/nexus_admin.db
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://movienexus.e4z.xyz}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
    ports:
      - "3210:3000"
    depends_on:
      - backend
    volumes:
      - movienexus_auth_data:/app/prisma
    networks:
      - saltbox
    labels:
      - "traefik.enable=true"
      # Main frontend router (all non-/api routes)
      - "traefik.http.routers.movienexus-web-http.entrypoints=web"
      - "traefik.http.routers.movienexus-web-http.middlewares=globalHeaders@file,redirect-to-https@docker,robotHeaders@file"
      - "traefik.http.routers.movienexus-web-http.rule=Host(`movienexus.e4z.xyz`)"
      - "traefik.http.routers.movienexus-web-http.service=movienexus-web-http"
      - "traefik.http.routers.movienexus-web.entrypoints=websecure"
      - "traefik.http.routers.movienexus-web.middlewares=globalHeaders@file,secureHeaders@file,robotHeaders@file"
      - "traefik.http.routers.movienexus-web.rule=Host(`movienexus.e4z.xyz`)"
      - "traefik.http.routers.movienexus-web.service=movienexus-web"
      - "traefik.http.routers.movienexus-web.tls=true"
      - "traefik.http.routers.movienexus-web.tls.certresolver=cfdns"
      - "traefik.http.routers.movienexus-web.tls.domains[0].main=e4z.xyz"
      # Auth router — /api/auth/* must reach Next.js, not FastAPI (longer rule wins)
      - "traefik.http.routers.movienexus-auth-http.entrypoints=web"
      - "traefik.http.routers.movienexus-auth-http.middlewares=globalHeaders@file,redirect-to-https@docker,robotHeaders@file"
      - "traefik.http.routers.movienexus-auth-http.rule=Host(`movienexus.e4z.xyz`) && PathPrefix(`/api/auth`)"
      - "traefik.http.routers.movienexus-auth-http.service=movienexus-web-http"
      - "traefik.http.routers.movienexus-auth.entrypoints=websecure"
      - "traefik.http.routers.movienexus-auth.middlewares=globalHeaders@file,secureHeaders@file,robotHeaders@file"
      - "traefik.http.routers.movienexus-auth.rule=Host(`movienexus.e4z.xyz`) && PathPrefix(`/api/auth`)"
      - "traefik.http.routers.movienexus-auth.service=movienexus-web"
      - "traefik.http.routers.movienexus-auth.tls=true"
      - "traefik.http.routers.movienexus-auth.tls.certresolver=cfdns"
      - "traefik.http.routers.movienexus-auth.tls.domains[0].main=e4z.xyz"
      - "traefik.http.routers.movienexus-web.tls.domains[0].sans=*.e4z.xyz"
      - "traefik.http.routers.movienexus-web.tls.options=securetls@file"
      - "traefik.http.services.movienexus-web-http.loadbalancer.server.port=3000"
      - "traefik.http.services.movienexus-web.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  redis_data:
  movienexus_auth_data:

networks:
  saltbox:
    external: true
