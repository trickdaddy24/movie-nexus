version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: movienexus-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-movienexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movienexus

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: movienexus-redis
    ports:
      - "6385:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movienexus

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movienexus-backend
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-movienexus}
      REDIS_URL: redis://redis:6379/0
      TMDB_API_KEY: ${TMDB_API_KEY}
      TVDB_API_KEY: ${TVDB_API_KEY}
      FANART_API_KEY: ${FANART_API_KEY}
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-false}
    ports:
      - "${BACKEND_PORT:-8910}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - movienexus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.movienexus-api.rule=Host(`movienexus.local`) && PathPrefix(`/api`)"
      - "traefik.http.services.movienexus-api.loadbalancer.server.port=8000"

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movienexus-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8910}/api
    ports:
      - "3210:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/.next
    networks:
      - movienexus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.movienexus-web.rule=Host(`movienexus.local`)"
      - "traefik.http.services.movienexus-web.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  redis_data:

networks:
  movienexus:
    driver: bridge
